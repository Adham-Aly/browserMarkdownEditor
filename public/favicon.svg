<!-- The app icon: a standalone duplicate of the PenTool icon that the "New
     drawing" button uses (src/components/icons.tsx). Deliberately a copy, not
     a shared asset: the favicon must stand alone in public/. The stroke is the
     app's accent purple (the dark-theme interactive-accent value) because
     currentColor has no meaning outside the app's CSS cascade. -->
